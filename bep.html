<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bếp — Màn hình đơn (KDS)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --do:#7A1A1A; --do-sau:#5E1414; --dong:#C8A24B; --dong-sang:#E7CE8E; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: "Be Vietnam Pro", system-ui, sans-serif; color: #EDE7DF; padding-bottom: 30px;
    background: radial-gradient(120% 50% at 50% -5%, #241B17 0%, #1A1512 55%, #140F0D 100%) fixed; }
  .wrap { max-width: 1200px; margin: 0 auto; }
  button { touch-action: manipulation; font-family: inherit; }
  button:active { transform: scale(.97); opacity: .92; }

  header { position: sticky; top: 0; z-index: 20; overflow: hidden;
    padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; gap: 12px;
    background: linear-gradient(180deg,#8C2222 0%, var(--do) 50%, var(--do-sau) 100%);
    border-bottom: 1px solid rgba(200,162,75,.55); box-shadow: 0 8px 24px rgba(60,12,12,.5); }
  header::before { content:""; position:absolute; inset:0 0 auto 0; height:50%;
    background: linear-gradient(180deg, rgba(255,255,255,.18), transparent); pointer-events:none; }
  header h1 { font-family:"Playfair Display",serif; font-weight:800; font-size:21px; color:#F6E6BC; position:relative; }
  header h1 span { font-family:"Be Vietnam Pro",sans-serif; }
  header .right { display: flex; gap: 9px; align-items: center; position:relative; flex-wrap:wrap; justify-content:flex-end; }
  .dot-live { width: 9px; height: 9px; border-radius: 50%; background: #6CE08A; display: inline-block; animation: pulse 1.5s infinite; box-shadow:0 0 8px rgba(108,224,138,.7); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .reset { background: rgba(0,0,0,.18); border: 1px solid rgba(231,206,142,.45); color: var(--dong-sang);
    padding: 8px 12px; border-radius: 9px; font-weight: 600; cursor: pointer; font-size: 13px; }

  /* Băng yêu cầu phục vụ */
  .sv-bar { display: flex; flex-wrap: wrap; gap: 10px; padding: 14px 16px 0; }
  .sv-card { background: linear-gradient(180deg,#5a4616,#42330f); border: 1px solid #C8A24B; border-radius: 12px;
    padding: 10px 14px; display: flex; align-items: center; gap: 12px; box-shadow:0 4px 14px rgba(0,0,0,.3); }
  .sv-card .txt { font-weight: 800; color: #ffe08a; }
  .sv-card .ban { background: var(--dong); color: #2A2012; border-radius: 7px; padding: 1px 9px; font-weight: 900; }
  .sv-card .note { font-size: 12px; color: #e3d4ab; }
  .sv-card button { background: linear-gradient(180deg,#37A24D,#2B7A3E); color: #fff; border: none; padding: 8px 13px;
    border-radius: 9px; font-weight: 700; cursor: pointer; box-shadow:inset 0 1px 0 rgba(255,255,255,.25); }

  /* Doanh thu hôm nay */
  .doanhthu { display: flex; align-items: center; gap: 8px; background: rgba(20,51,31,.6);
    border: 1px solid #2f7a4a; color: #8CE99A; padding: 7px 13px; border-radius: 10px; font-size: 13px; }
  .doanhthu b { color: #b6f5c8; font-size: 16px; }

  /* Dải bàn đang phục vụ */
  .ban-bar { padding: 16px 16px 0; }
  .ban-bar h3 { font-family:"Playfair Display",serif; font-size: 16px; color: var(--dong-sang); margin-bottom: 9px; font-weight: 700; }
  .ban-list { display: flex; flex-wrap: wrap; gap: 10px; }
  .ban-card { background: linear-gradient(180deg,#2E2620,#241D18); border: 1px solid rgba(200,162,75,.35); border-radius: 12px;
    padding: 11px 13px; min-width: 152px; box-shadow:0 4px 14px rgba(0,0,0,.25); }
  .ban-card .bn { font-family:"Playfair Display",serif; font-weight: 800; font-size: 17px; color: var(--dong-sang); }
  .ban-card .meta { font-size: 12px; color: #9c8d7d; margin: 2px 0 9px; }
  .ban-card .tong { font-weight: 800; font-size: 15px; color: #fff; }
  .ban-card .pay { width: 100%; margin-top: 9px; background: linear-gradient(180deg,#37A24D,#2B7A3E); color: #fff; border: none;
    padding: 10px; border-radius: 9px; font-weight: 700; cursor: pointer; font-size: 13px; box-shadow:inset 0 1px 0 rgba(255,255,255,.25); }
  .ban-empty { color: #6b5d4f; font-size: 13px; }

  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 16px; }
  @media (max-width: 800px){ .grid { grid-template-columns: 1fr; } }

  .col { background: rgba(34,28,24,.7); border: 1px solid rgba(255,255,255,.04); border-radius: 14px; padding: 11px; min-height: 200px; }
  .col-head { display: flex; justify-content: space-between; align-items: center;
    font-weight: 800; padding: 10px 13px; border-radius: 10px; margin-bottom: 11px; font-size: 15px; }
  .col-head .dem { background: rgba(0,0,0,.28); border-radius: 20px; padding: 1px 10px; font-size: 14px; }
  .h-moi { background: linear-gradient(180deg,#46291a,#33200f); color: #FFB264; }
  .h-lam { background: linear-gradient(180deg,#1d3346,#142736); color: #74C0FC; }
  .h-xong { background: linear-gradient(180deg,#1d3a28,#13301f); color: #8CE99A; }
  .trong { text-align: center; color: #6b5d4f; font-size: 13px; padding: 24px; }

  .ticket { background: linear-gradient(180deg,#2E2620,#251E19); border-radius: 11px; padding: 12px; margin-bottom: 10px;
    border-left: 4px solid var(--dong); box-shadow:0 3px 10px rgba(0,0,0,.25); }
  .ticket.lam { border-left-color: #4DABF7; }
  .ticket.xong { border-left-color: #51CF66; opacity: .72; }
  .t-head { display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px dashed #463c32; }
  .t-ban { font-family:"Playfair Display",serif; font-weight: 800; font-size: 18px; color:var(--dong-sang); }
  .t-time { font-size: 12px; color: #9c8d7d; }
  .t-mon { display: flex; gap: 8px; font-size: 16px; padding: 4px 0; }
  .t-mon b { color: #FFB264; min-width: 30px; }
  .t-note { font-size: 13px; color: #ffd8a8; background: #3a2c18; padding: 6px 9px; border-radius: 7px; margin-top: 6px; }
  .act { width: 100%; color: #fff; border: none; padding: 11px; border-radius: 9px;
    font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 10px; box-shadow:inset 0 1px 0 rgba(255,255,255,.18); }
  .a-lam { background: linear-gradient(180deg,#2284E0,#1971C2); }
  .a-xong { background: linear-gradient(180deg,#37A24D,#2B7A3E); }
  .a-mo { background: linear-gradient(180deg,#566069,#414950); }

  .pinbox { position: fixed; inset: 0; background: rgba(10,6,5,.85); -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px);
    display: flex; align-items: center; justify-content: center; z-index: 100; }
  .pinbox .panel { background: linear-gradient(180deg,#2E2620,#221B17); padding: 30px; border-radius: 18px; width: 310px; text-align: center;
    border:1px solid rgba(200,162,75,.4); box-shadow:0 20px 50px rgba(0,0,0,.5); }
  .pinbox h2 { font-family:"Playfair Display",serif; font-size: 20px; margin-bottom: 6px; color:var(--dong-sang); }
  .pinbox p { font-size: 13px; color: #9c8d7d; margin-bottom: 16px; }
  .pinbox input { width: 100%; padding: 12px; font-size: 20px; text-align: center; letter-spacing: 6px;
    border-radius: 10px; border: 1px solid #463c32; background: #15110E; color: #fff; margin-bottom: 12px; }
  .pinbox button { width: 100%; padding: 13px; color: #fff; border: none; border-radius: 11px; font-weight: 700; font-size: 15px; cursor: pointer;
    background: linear-gradient(180deg,#9A2B2B,var(--do)); box-shadow:inset 0 1px 0 rgba(255,255,255,.25); }
  .pinbox .err { color: #ff8787; font-size: 13px; min-height: 18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>👨‍🍳 Màn hình bếp <span style="color:#9c8d7d;font-size:13px;font-weight:400">— KDS</span></h1>
    <div class="right">
      <span class="dot-live"></span><span style="font-size:12px;color:#9c8d7d">Trực tuyến</span>
      <div class="doanhthu">💰 Hôm nay: <b id="dtHomNay">0đ</b></div>
      <button class="reset" id="btnChuong" onclick="toggleChuong()">🔔 Chuông: Bật</button>
      <button class="reset" onclick="xoaHet()">Xóa tất cả (cuối ngày)</button>
    </div>
  </header>
  <div class="sv-bar" id="svBar"></div>
  <div class="ban-bar">
    <h3>🍽️ BÀN ĐANG PHỤC VỤ — bấm để tính tiền &amp; dọn bàn</h3>
    <div class="ban-list" id="banList"></div>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div class="pinbox" id="pinbox">
  <div class="panel">
    <h2>🔒 Trang bếp</h2>
    <p>Nhập mã PIN để vào màn hình điều khiển</p>
    <input id="pinInput" type="password" inputmode="numeric" maxlength="8" placeholder="••••" autofocus>
    <div class="err" id="pinErr"></div>
    <button onclick="vaoBep()">Vào bếp</button>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyEN7YLX8dMSFdhsqlxxru6Uedtuk09A2b6Wlj-Cos0Kyv8IRJ4HLXqiWPjD3VNHCVI/exec";

/* Gọi máy chủ ĐÚNG CÁCH ViệcNhà247: POST text/plain + JSON.stringify */
async function jsonp(params) {
  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(params)
    });
    return await res.json();
  } catch (e) {
    return { ok: false, error: "Lỗi kết nối mạng: " + e };
  }
}

let PIN = "";
let audio = null;
let seen = new Set();
let firstLoad = true;
let chuongBat = true;
let donHienTai = [];   // bộ nhớ tạm để đổi trạng thái hiện ngay

function toggleChuong() {
  chuongBat = !chuongBat;
  document.getElementById("btnChuong").textContent = "🔔 Chuông: " + (chuongBat ? "Bật" : "Tắt");
  if (chuongBat) ting(); // kêu thử khi bật
}

const TT = {
  moi:   { label:"Đơn mới",  cls:"h-moi", tcls:"" },
  dang_lam:{ label:"Đang làm", cls:"h-lam", tcls:"lam" },
  xong:  { label:"Đã xong",  cls:"h-xong", tcls:"xong" },
};
const fmt = n => n.toLocaleString("vi-VN") + "đ";
const laYeuCau = o => o.items.every(i => i.gia === 0);

function vaoBep() {
  const v = document.getElementById("pinInput").value.trim();
  if (!v) { document.getElementById("pinErr").textContent = "Nhập mã PIN"; return; }
  PIN = v;
  try { audio = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
  document.getElementById("pinbox").style.display = "none";
  setTimeout(ting, 300); // kêu thử 1 tiếng để xác nhận loa đã bật
  taiDon().then(lenLich);
}
document.getElementById("pinInput").addEventListener("keydown", e => { if(e.key==="Enter") vaoBep(); });
// Làm mới đều, tự né gọi chồng; làm mới ngay khi quay lại màn hình
function lenLich() {
  clearTimeout(window._timer);
  window._timer = setTimeout(async () => { await taiDon(); lenLich(); }, 2500);
}
document.addEventListener("visibilitychange", () => { if (!document.hidden && PIN) { taiDon(); lenLich(); } });
window.addEventListener("focus", () => { if (PIN) taiDon(); });

/* Chuông báo đơn mới */
function ting() {
  if (!audio || !chuongBat) return;
  try {
    [0, 0.16].forEach((t, k) => {
      const o = audio.createOscillator(), g = audio.createGain();
      o.connect(g); g.connect(audio.destination);
      o.type = "sine"; o.frequency.value = k === 0 ? 880 : 1175;
      g.gain.setValueAtTime(0.0001, audio.currentTime + t);
      g.gain.exponentialRampToValueAtTime(0.25, audio.currentTime + t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + t + 0.14);
      o.start(audio.currentTime + t); o.stop(audio.currentTime + t + 0.15);
    });
  } catch(e){}
}

let bepDangTai = false;
async function taiDon() {
  if (bepDangTai) return;
  bepDangTai = true;
  try {
    const d = await jsonp({ action:"list" });
    if (d && d.ok) {
      if (d.doanhThu) document.getElementById("dtHomNay").textContent =
        fmt(d.doanhThu.tong) + " · " + d.doanhThu.soBan + " bàn";
      const orders = d.orders.sort((a,b)=>a.luc-b.luc);
      donHienTai = orders;
      const coDonMoi = orders.some(o => !seen.has(o.id));
      if (!firstLoad && coDonMoi) ting();
      orders.forEach(o => seen.add(o.id));
      firstLoad = false;
      ve(orders);
    }
  } catch(e){ /* giữ màn hình cũ */ }
  finally { bepDangTai = false; }
}

function ve(orders) {
  // Băng yêu cầu phục vụ (chưa xử lý)
  const yc = orders.filter(o => laYeuCau(o) && o.trangThai !== "xong");
  document.getElementById("svBar").innerHTML = yc.map(o => `
    <div class="sv-card">
      <span class="ban">${o.ban}</span>
      <div>
        <div class="txt">${o.items[0].ten}</div>
        ${o.note ? `<div class="note">${o.note}</div>` : ``}
      </div>
      <button onclick="doi('${o.id}','xong')">Đã xử lý ✓</button>
    </div>`).join("");

  // Dải BÀN ĐANG PHỤC VỤ: gộp theo bàn, cộng tiền món (bỏ yêu cầu phục vụ giá 0)
  const banMap = {};
  orders.forEach(o => {
    if (!banMap[o.ban]) banMap[o.ban] = { ban: o.ban, tong: 0, soMon: 0, chuaXong: 0 };
    o.items.forEach(i => {
      if (i.gia > 0) { banMap[o.ban].tong += i.gia * i.soLuong; banMap[o.ban].soMon += i.soLuong; }
    });
    if (o.trangThai !== "xong" && !laYeuCau(o)) banMap[o.ban].chuaXong++;
  });
  const dsBan = Object.values(banMap).filter(b => b.soMon > 0).sort((a,b)=>String(a.ban).localeCompare(String(b.ban)));
  const banList = document.getElementById("banList");
  banList.innerHTML = dsBan.length ? dsBan.map(b => `
    <div class="ban-card">
      <div class="bn">Bàn ${b.ban}</div>
      <div class="meta">${b.soMon} món${b.chuaXong ? ` · còn ${b.chuaXong} lượt chưa xong` : ` · đã xong hết`}</div>
      <div class="tong">${fmt(b.tong)}</div>
      <button class="pay" onclick="dongBan('${b.ban}', ${b.tong})">✓ Thanh toán &amp; dọn bàn</button>
    </div>`).join("") : `<div class="ban-empty">Chưa có bàn nào đang phục vụ.</div>`;

  // Cột món ăn (bỏ yêu cầu phục vụ ra khỏi 3 cột)
  const mon = orders.filter(o => !laYeuCau(o));
  const cols = [
    { key:"moi",     list: mon.filter(o=>o.trangThai==="moi") },
    { key:"dang_lam",list: mon.filter(o=>o.trangThai==="dang_lam") },
    { key:"xong",    list: mon.filter(o=>o.trangThai==="xong") },
  ];
  document.getElementById("grid").innerHTML = cols.map(c => `
    <div class="col">
      <div class="col-head ${TT[c.key].cls}">${TT[c.key].label}<span class="dem">${c.list.length}</span></div>
      ${c.list.length ? c.list.map(o=>ticket(o)).join("") : `<div class="trong">Chưa có đơn</div>`}
    </div>`).join("");
}

function ticket(o) {
  const time = new Date(o.luc).toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"});
  let btn = "";
  if (o.trangThai==="moi")      btn = `<button class="act a-lam"  onclick="doi('${o.id}','dang_lam')">Bắt đầu làm</button>`;
  if (o.trangThai==="dang_lam") btn = `<button class="act a-xong" onclick="doi('${o.id}','xong')">Xong món ✓</button>`;
  if (o.trangThai==="xong")     btn = `<button class="act a-mo"   onclick="doi('${o.id}','dang_lam')">↩ Mở lại</button>`;
  return `
    <div class="ticket ${TT[o.trangThai].tcls}">
      <div class="t-head"><span class="t-ban">${o.ban}</span><span class="t-time">${time}</span></div>
      ${o.items.map(i=>`<div class="t-mon"><b>×${i.soLuong}</b><span>${i.ten}</span></div>`).join("")}
      ${o.note ? `<div class="t-note">📝 ${o.note}</div>` : ``}
      ${btn}
    </div>`;
}

async function doi(id, trangThai) {
  // đổi ngay trên màn hình (lạc quan), rồi gửi ngầm
  const o = donHienTai.find(x => x.id === id);
  if (o) { o.trangThai = trangThai; ve(donHienTai); }
  try {
    const d = await jsonp({ action:"update", id, trangThai, pin:PIN });
    if (!d.ok) { alert(d.error || "Không đổi được"); taiDon(); return; }
    setTimeout(taiDon, 500);
  } catch(e){ alert("Lỗi mạng: " + e); taiDon(); }
}

async function dongBan(ban, tong) {
  if (!confirm("Đóng Bàn " + ban + "?\nTổng " + fmt(tong) + " sẽ được cộng vào doanh thu hôm nay, và đơn của bàn này sẽ được xóa để đón khách mới.")) return;
  try {
    const d = await jsonp({ action:"close_table", ban:ban, pin:PIN });
    if (!d.ok) { alert(d.error || "Không đóng được bàn"); return; }
    taiDon();
  } catch(e){ alert("Lỗi mạng: " + e); }
}

async function xoaHet() {
  const ma = prompt("⚠️ XÓA TẤT CẢ đơn của mọi bàn (chỉ dùng cuối ngày).\nNhập mã PIN bếp để xác nhận:");
  if (ma === null) return;                 // bấm Hủy
  if (String(ma).trim() !== String(PIN)) { alert("Sai mã PIN. Không xóa."); return; }
  if (!confirm("Chắc chắn xóa TẤT CẢ đơn hiện tại?")) return;
  try {
    const d = await jsonp({ action:"reset", pin:PIN });
    if (!d.ok) { alert(d.error || "Không xóa được"); return; }
    seen = new Set(); taiDon();
  } catch(e){ alert("Lỗi mạng: " + e); }
}
</script>
</body>
</html>
