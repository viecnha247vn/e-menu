<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
  body{background:#15110F;color:#eee}
  .bar{background:#6E1423;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:5}
  .bar h2{font-size:19px;color:#F7F2E7}
  .bar .st{font-size:12px;color:#E3CA8C}
  .grid{padding:16px;display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
  .ticket{background:#211B18;border-radius:14px;padding:15px 17px;border-left:4px solid #C9A24B;animation:pop .3s}
  @keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .ticket.served{border-left-color:#3D5A3C;opacity:.5}
  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .tbl{font-size:17px;font-weight:700;color:#E3CA8C}
  .time{font-size:12px;color:#888}
  ul{list-style:none}
  li{display:flex;padding:5px 0;font-size:15px;border-bottom:1px dashed #332b27}
  .q{color:#C9A24B;font-weight:700;margin-right:8px}
  .btn{margin-top:12px;width:100%;background:#3D5A3C;color:#fff;border:none;padding:11px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer}
  .ticket.served .btn{background:#444}
  .empty{text-align:center;color:#666;padding:60px 20px}
</style></head><body>
<div class="bar"><h2>🍳 Bếp · Nhà Hàng Việt</h2><span class="st" id="st">Đang kết nối…</span></div>
<div class="grid" id="grid"></div>
<script>
  var last='';
  function render(orders){
    document.getElementById('st').textContent='Cập nhật '+new Date().toLocaleTimeString('vi-VN');
    var sig=JSON.stringify((orders||[]).map(function(o){return [o.id,o.served];}));
    if(sig===last)return; last=sig;            // không đổi -> không vẽ lại -> không chớp
    var g=document.getElementById('grid');
    if(!orders||!orders.length){g.innerHTML='<div class="empty">Chưa có đơn nào</div>';return;}
    g.innerHTML=orders.map(function(o){
      var li=o.items.map(function(i){return '<li><span class="q">'+i.qty+'×</span>'+i.name+'</li>';}).join('');
      return '<div class="ticket'+(o.served?' served':'')+'">'
        +'<div class="top"><span class="tbl">🪑 Bàn '+o.table+'</span><span class="time">'+o.time+'</span></div>'
        +'<ul>'+li+'</ul>'
        +'<button class="btn" onclick="serve('+o.id+')">'+(o.served?'✓ Đã phục vụ':'Đánh dấu đã xong')+'</button></div>';
    }).join('');
  }
  function poll(){
    google.script.run
      .withSuccessHandler(function(o){render(o);setTimeout(poll,3000);})
      .withFailureHandler(function(){document.getElementById('st').textContent='Mất kết nối, thử lại…';setTimeout(poll,5000);})
      .getOrdersData();
  }
  function serve(id){
    google.script.run.withSuccessHandler(function(){last='';poll();}).setServed(id);
  }
  poll();
</script></body></html>
