<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản trị thực đơn — Quán Việt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --do:#7A1A1A; --do-sau:#5E1414; --do-sang:#9A2B2B;
    --dong:#C8A24B; --dong-sang:#E7CE8E; --kem:#F4EFE4; --muc:#2A2320; --muc-nhat:#8A7F72;
    --vien:rgba(122,26,26,.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: "Be Vietnam Pro", system-ui, sans-serif; color: var(--muc); padding-bottom: 50px;
    background: radial-gradient(120% 50% at 50% -10%, #FBF7EE 0%, var(--kem) 45%, #ECE4D4 100%) fixed; }
  .wrap { max-width: 760px; margin: 0 auto; padding: 16px; }
  button { touch-action: manipulation; font-family: inherit; }
  button:active { transform: scale(.97); }

  header { position: relative; overflow: hidden; padding: 17px 20px 16px; text-align: center;
    background: linear-gradient(180deg,#8C2222 0%, var(--do) 48%, var(--do-sau) 100%);
    border-bottom: 1px solid rgba(200,162,75,.55); box-shadow: 0 8px 26px rgba(94,20,20,.40); }
  header::before { content:""; position:absolute; inset:0 0 auto 0; height:50%;
    background: linear-gradient(180deg, rgba(255,255,255,.22), transparent); pointer-events:none; }
  header .logo { font-family:"Playfair Display",serif; font-weight:800; font-size:26px; color:#F6E6BC;
    text-shadow:0 1px 0 rgba(0,0,0,.25); }
  header .tag { margin-top:3px; font-size:10.5px; font-weight:600; text-transform:uppercase; letter-spacing:4px; color:rgba(231,206,142,.85); }
  header .rule { width:46px; height:2px; margin:9px auto 0; border-radius:2px; background:linear-gradient(90deg,transparent,var(--dong),transparent); }

  .card { border-radius:18px; padding:18px; margin-bottom:16px;
    background:rgba(255,255,255,.74); -webkit-backdrop-filter:blur(14px) saturate(150%); backdrop-filter:blur(14px) saturate(150%);
    border:1px solid rgba(255,255,255,.7); box-shadow:0 10px 34px rgba(80,45,20,.10), inset 0 1px 0 rgba(255,255,255,.85); }
  h3 { font-family:"Playfair Display",serif; font-weight:700; font-size:20px; color:var(--do); margin-bottom:14px; }
  label { display:block; font-size:12px; color:var(--muc-nhat); font-weight:600; margin:11px 0 4px; }
  input, textarea, select { width:100%; padding:11px 13px; border:1px solid rgba(122,26,26,.18); border-radius:10px;
    font-size:15px; font-family:inherit; background:#fff; color:var(--muc); }
  input:focus, textarea:focus, select:focus { outline:none; border-color:var(--dong); box-shadow:0 0 0 3px rgba(200,162,75,.18); }
  textarea { resize:vertical; min-height:54px; }
  .row { display:flex; gap:12px; flex-wrap:wrap; }
  .row > div { flex:1; min-width:120px; }

  .btn { color:#fff; border:none; padding:12px 20px; border-radius:11px; font-size:15px; font-weight:700; cursor:pointer;
    background:linear-gradient(180deg,var(--do-sang),var(--do));
    box-shadow:inset 0 1px 0 rgba(255,255,255,.3), 0 4px 12px rgba(122,26,26,.28); }
  .btn.ghost { background:linear-gradient(180deg,#fff,#F4ECDD); color:var(--do); border:1px solid rgba(200,162,75,.5);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.9); }
  .btn.sm { padding:8px 14px; font-size:13px; border-radius:9px; }
  .btn.del { background:#fff; color:#B22; border:1px solid #f0c5c5; box-shadow:none; }

  .preview { width:80px; height:80px; border-radius:12px; object-fit:cover; border:1px solid rgba(200,162,75,.4); background:#f1e9da; }
  .photoWrap { display:flex; gap:12px; align-items:center; }

  .item { display:flex; gap:13px; align-items:center; padding:13px 0; border-bottom:1px solid var(--vien); }
  .item:last-child { border-bottom:none; }
  .item .thumb { width:58px; height:58px; border-radius:12px; object-fit:cover; background:#f1e9da; display:flex; align-items:center; justify-content:center; font-size:28px; flex:none; border:1px solid rgba(200,162,75,.3); }
  .item .info { flex:1; min-width:0; }
  .item .ten { font-weight:600; }
  .item .gia { color:var(--do); font-weight:700; font-size:14.5px; }
  .item .mota { font-size:12px; color:var(--muc-nhat); }
  .item.an { opacity:.5; }
  .item .acts { display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; }

  .pill { font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px; background:#E9F7EC; color:#2B7A3E; }
  .pill.off { background:#F1F0EE; color:#999; }

  .pinbox { position:fixed; inset:0; background:rgba(40,15,15,.6); -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px);
    display:flex; align-items:center; justify-content:center; z-index:100; padding:20px; }
  .pinbox .panel { background:linear-gradient(180deg,#FFFDF8,#F5EEE0); padding:28px; border-radius:18px; width:330px; text-align:center;
    border:1px solid rgba(200,162,75,.4); box-shadow:0 20px 50px rgba(0,0,0,.35); }
  .pinbox h3 { margin-bottom:6px; }
  .pinbox input { text-align:center; letter-spacing:2px; margin:14px 0; }
  .toast { position:fixed; bottom:26px; left:50%; transform:translateX(-50%); background:linear-gradient(180deg,#2F8F44,#247135);
    color:#fff; padding:12px 22px; border-radius:30px; font-weight:700; font-size:14px; opacity:0; transition:.3s; z-index:120; box-shadow:0 8px 22px rgba(0,0,0,.3); }
  .toast.show { opacity:1; }
  .muted { font-size:12px; color:var(--muc-nhat); }
  .grp-head { font-family:"Playfair Display",serif; font-weight:700; color:var(--do); font-size:17px; margin:18px 0 4px;
    padding-bottom:6px; border-bottom:1px solid rgba(200,162,75,.4); }
  .grp-head:first-child { margin-top:0; }
  .grp-head span { color:var(--dong); font-weight:700; font-size:12px; }
</style>
</head>
<body>
<header>
  <div class="logo">Quán Việt</div>
  <div class="tag">Quản trị thực đơn</div>
  <div class="rule"></div>
</header>

<div class="wrap" id="app" style="display:none">
  <!-- Form thêm/sửa -->
  <div class="card">
    <h3 id="formTitle">➕ Thêm món mới</h3>
    <input type="hidden" id="fId">
    <label>Tên món *</label>
    <input id="fTen" placeholder="VD: Phở bò tái">
    <div class="row">
      <div>
        <label>Giá (đ) *</label>
        <input id="fGia" type="number" inputmode="numeric" placeholder="55000">
      </div>
      <div>
        <label>Phân loại *</label>
        <select id="fNhom">
          <option>Khai vị</option>
          <option selected>Món chính</option>
          <option>Tráng miệng</option>
          <option>Đồ uống</option>
        </select>
      </div>
    </div>
    <label>Biểu tượng (emoji, dùng khi không có ảnh)</label>
    <input id="fIcon" placeholder="🍜" maxlength="4">
    <label>Mô tả</label>
    <textarea id="fMota" placeholder="Bánh phở, thịt bò tái, hành ngò"></textarea>
    <label>Ảnh món (tùy chọn — máy sẽ tự thu nhỏ ảnh)</label>
    <div class="photoWrap">
      <img id="fPreview" class="preview" alt="">
      <div>
        <input id="fFile" type="file" accept="image/*" onchange="chonAnh(event)">
        <div class="muted" id="anhTrangThai"></div>
      </div>
    </div>
    <label><input type="checkbox" id="fHien" checked style="width:auto"> Hiện món này cho khách</label>
    <div style="margin-top:14px; display:flex; gap:10px">
      <button class="btn" onclick="luuMon()" id="btnLuu">Lưu món</button>
      <button class="btn ghost" onclick="resetForm()">Làm mới</button>
    </div>
  </div>

  <!-- Danh sách -->
  <div class="card">
    <h3>📋 Danh sách món (<span id="dem">0</span>)</h3>
    <div id="ds"></div>
  </div>
</div>

<!-- Đăng nhập -->
<div class="pinbox" id="pinbox">
  <div class="panel">
    <h3>🔒 Quản trị thực đơn</h3>
    <p class="muted">Nhập mật khẩu quản trị để vào</p>
    <input id="pass" type="password" placeholder="Mật khẩu">
    <div class="muted" id="passErr" style="color:#C92A2A;min-height:16px"></div>
    <button class="btn" style="width:100%" onclick="dangNhap()">Vào quản trị</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyEN7YLX8dMSFdhsqlxxru6Uedtuk09A2b6Wlj-Cos0Kyv8IRJ4HLXqiWPjD3VNHCVI/exec";
let PASS = "";
let anhData = "";   // base64 ảnh mới (nếu có)
let menu = [];

async function jsonp(params) {
  try {
    const res = await fetch(API, { method:"POST", headers:{ "Content-Type":"text/plain;charset=utf-8" }, body: JSON.stringify(params) });
    return await res.json();
  } catch (e) { return { ok:false, error:"Lỗi kết nối mạng: " + e }; }
}
const fmt = n => (Number(n)||0).toLocaleString("vi-VN") + "đ";
function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2200); }

async function dangNhap() {
  const v = document.getElementById("pass").value.trim();
  if (!v) return;
  // thử lưu/đọc nhẹ để xác thực: gọi menu_list (công khai) rồi kiểm pass khi lưu.
  // Ở đây xác thực bằng cách thử 1 lệnh cần pass an toàn: menu_save sẽ báo sai nếu sai pass.
  PASS = v;
  document.getElementById("pinbox").style.display = "none";
  document.getElementById("app").style.display = "block";
  taiMenu();
}
document.getElementById("pass").addEventListener("keydown", e=>{ if(e.key==="Enter") dangNhap(); });

async function taiMenu() {
  const d = await jsonp({ action:"menu_list", all:true });
  if (!d.ok) { toast("Lỗi tải menu"); return; }
  menu = d.menu || [];
  veDS();
}

function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }

const NHOM_THUTU = ["Khai vị", "Món chính", "Tráng miệng", "Đồ uống"];

function veDS() {
  document.getElementById("dem").textContent = menu.length;
  const nhomMap = {};
  menu.forEach(m => { const k = m.nhom || "Món chính"; (nhomMap[k] = nhomMap[k] || []).push(m); });
  const thuTu = [...NHOM_THUTU, ...Object.keys(nhomMap).filter(k => !NHOM_THUTU.includes(k))];
  let html = "";
  thuTu.forEach(nhom => {
    const ds = nhomMap[nhom];
    if (!ds || !ds.length) return;
    html += `<div class="grp-head">${esc(nhom)} <span>· ${ds.length}</span></div>`;
    html += ds.map(m => itemRow(m)).join("");
  });
  document.getElementById("ds").innerHTML = html || '<div class="muted">Chưa có món nào.</div>';
}

function itemRow(m) {
  return `
    <div class="item ${m.hien ? "" : "an"}">
      <div class="thumb">${m.anh
        ? `<img src="${esc(m.anh)}" style="width:100%;height:100%;object-fit:cover;border-radius:10px" onerror="this.style.display='none'">`
        : esc(m.icon || "🍽️")}</div>
      <div class="info">
        <div class="ten">${esc(m.ten)} <span class="pill ${m.hien?"":"off"}">${m.hien?"Đang hiện":"Đang ẩn"}</span></div>
        <div class="gia">${fmt(m.gia)}</div>
        <div class="mota">${esc(m.mota||"")}</div>
      </div>
      <div class="acts">
        <button class="btn sm ghost" onclick="suaMon('${esc(m.id)}')">Sửa</button>
        <button class="btn sm ghost" onclick="anHien('${esc(m.id)}', ${m.hien})">${m.hien?"Ẩn":"Hiện"}</button>
        <button class="btn sm del" onclick="xoaMon('${esc(m.id)}')">Xóa</button>
      </div>
    </div>`;
}

// Thu nhỏ ảnh trước khi upload (đỡ nặng, nhanh)
function chonAnh(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  document.getElementById("anhTrangThai").textContent = "Đang xử lý ảnh…";
  const img = new Image(); const reader = new FileReader();
  reader.onload = e => img.src = e.target.result;
  img.onload = () => {
    const maxW = 700, scale = Math.min(1, maxW / img.width);
    const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
    const c = document.createElement("canvas"); c.width=w; c.height=h;
    c.getContext("2d").drawImage(img, 0, 0, w, h);
    anhData = c.toDataURL("image/jpeg", 0.72);
    document.getElementById("fPreview").src = anhData;
    document.getElementById("anhTrangThai").textContent = "Đã chọn ảnh ✓";
  };
  img.onerror = () => document.getElementById("anhTrangThai").textContent = "Ảnh lỗi, chọn ảnh khác.";
  reader.readAsDataURL(file);
}

function resetForm() {
  document.getElementById("formTitle").textContent = "➕ Thêm món mới";
  document.getElementById("fId").value = "";
  document.getElementById("fTen").value = "";
  document.getElementById("fGia").value = "";
  document.getElementById("fIcon").value = "";
  document.getElementById("fMota").value = "";
  document.getElementById("fNhom").value = "Món chính";
  document.getElementById("fHien").checked = true;
  document.getElementById("fFile").value = "";
  document.getElementById("fPreview").src = "";
  document.getElementById("anhTrangThai").textContent = "";
  anhData = "";
}

function suaMon(id) {
  const m = menu.find(x => String(x.id) === String(id));
  if (!m) return;
  document.getElementById("formTitle").textContent = "✏️ Sửa: " + m.ten;
  document.getElementById("fId").value = m.id;
  document.getElementById("fTen").value = m.ten;
  document.getElementById("fGia").value = m.gia;
  document.getElementById("fIcon").value = m.icon || "";
  document.getElementById("fMota").value = m.mota || "";
  document.getElementById("fNhom").value = NHOM_THUTU.includes(m.nhom) ? m.nhom : "Món chính";
  document.getElementById("fHien").checked = !!m.hien;
  document.getElementById("fPreview").src = m.anh || "";
  document.getElementById("anhTrangThai").textContent = m.anh ? "Đang dùng ảnh cũ (chọn ảnh mới nếu muốn đổi)" : "";
  anhData = "";
  window.scrollTo({ top: 0, behavior: "smooth" });
}

async function luuMon() {
  const ten = document.getElementById("fTen").value.trim();
  const gia = Number(document.getElementById("fGia").value) || 0;
  if (!ten) { toast("Nhập tên món"); return; }
  if (gia <= 0) { toast("Nhập giá hợp lệ"); return; }
  const btn = document.getElementById("btnLuu");
  btn.disabled = true; btn.textContent = "Đang lưu…";
  const payload = {
    action: "menu_save", adminPass: PASS,
    id: document.getElementById("fId").value || undefined,
    ten: ten, gia: gia,
    icon: document.getElementById("fIcon").value.trim() || "🍽️",
    mota: document.getElementById("fMota").value.trim(),
    nhom: document.getElementById("fNhom").value,
    hien: document.getElementById("fHien").checked
  };
  if (anhData) payload.anhData = anhData;
  const d = await jsonp(payload);
  btn.disabled = false; btn.textContent = "Lưu món";
  if (!d.ok) { toast(d.error || "Lưu lỗi"); return; }
  if (d.anhLoi) { alert("Món đã lưu, NHƯNG ảnh chưa vào được:\n\n" + d.anhLoi + "\n\nXem hướng dẫn cấp quyền Drive."); }
  else { toast("Đã lưu món ✓"); }
  resetForm();
  taiMenu();
}

async function anHien(id, dangHien) {
  const m = menu.find(x => x.id === id); if (!m) return;
  const d = await jsonp({ action:"menu_save", adminPass:PASS, id:id, ten:m.ten, gia:m.gia, icon:m.icon, mota:m.mota, nhom:m.nhom, hien: !dangHien, anh: m.anh });
  if (!d.ok) { toast(d.error || "Lỗi"); return; }
  taiMenu();
}

async function xoaMon(id) {
  const m = menu.find(x => String(x.id) === String(id));
  const ten = m ? m.ten : "";
  if (!confirm('Xóa món "' + ten + '"? Không thể hoàn tác.')) return;
  const d = await jsonp({ action:"menu_delete", adminPass:PASS, id:id });
  if (!d.ok) { toast(d.error || "Xóa lỗi"); return; }
  toast("Đã xóa ✓");
  taiMenu();
}
</script>
</body>
</html>
